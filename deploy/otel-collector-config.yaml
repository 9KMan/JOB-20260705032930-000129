# CPA Document Intake — OpenTelemetry Collector configuration
# Decision: 02-router-confidence — distributed traces for routing decisions.
# Decision: 03-audit-immutability — audit pipeline observability.
# Decision: 05-reviewer-workflow — reviewer-action spans for compliance.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Drop health-check traffic to keep cardinality low.
  filter/healthcheck:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - "http.server.duration"
  # Memory limiter so the collector never OOMs the node.
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  # Batch for export efficiency.
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s
  # Resource attributes for trace correlation.
  resource:
    attributes:
      - key: deployment.environment
        from_attribute: deployment.environment
        action: upsert
      - key: service.namespace
        value: cpa-workflow-automation
        action: upsert

exporters:
  otlphttp:
    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
    headers:
      x-tenant-id: ${env:AZURE_TENANT_ID}
  logging:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp]
      processors: [filter/healthcheck, memory_limiter, batch]
      exporters: [otlphttp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp]