{{/*
CPA Document Intake — API Service
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cpa-doc-intake.fullname" . }}-api
  labels:
    {{- include "cpa-doc-intake.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "cpa-doc-intake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api