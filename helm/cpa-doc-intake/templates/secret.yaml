# Reference Secret for sensitive values mounted via Azure Key Vault CSI driver.
# The driver mounts individual secrets as files inside the pod (see deployment.yaml
# volumes). This Secret object only carries NON-CRITICAL metadata so that Helm
# sees a valid Secret (some operators prefer chart-driven Secret objects).
apiVersion: v1
kind: Secret
metadata:
  name: cpa-doc-intake-keyvault-ref
  labels:
    {{- include "cpa-doc-intake.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB_HINT: {{ .Values.postgres.db | quote }}
  REDIS_HOST_HINT:  {{ .Values.redis.host | quote }}
